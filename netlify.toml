[build]
  command   = "npx vite build"
  publish   = "dist/public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from   = "/api/pix/create"
  to     = "/.netlify/functions/pix-create"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
